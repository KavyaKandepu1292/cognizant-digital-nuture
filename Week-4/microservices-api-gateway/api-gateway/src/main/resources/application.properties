server.port=8080
spring.application.name=api-gateway

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Exercise 1: Routing and Filtering
spring.cloud.gateway.routes[0].id=greet-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/greet/**

spring.cloud.gateway.routes[1].id=account-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/accounts/**

spring.cloud.gateway.routes[2].id=loan-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/loans/**

spring.cloud.gateway.routes[3].id=composite-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/composite/**

# Exercise 2: Load Balancing
spring.cloud.gateway.routes[4].id=load-balanced-greet
spring.cloud.gateway.routes[4].uri=lb://greet-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/loadbalanced/**

# Exercise 3: Resilience
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.failureRateThreshold=50

logging.level.com.cognizant=DEBUG
management.endpoints.web.exposure.include=*